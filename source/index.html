<!doctype html>
<html lang="ru">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <meta http-equiv="refresh" content="0; url=https://source-schema.vercel.app/">
    <title>Redirecting...</title>
    <script>
      const rest = location.pathname.replace(/^\/source\/?/, "");
      location.replace("https://source-schema.vercel.app/" + rest + location.search + location.hash);
    </script>
  </head>
  <body>
    <a href="https://source-schema.vercel.app/">source-schema.vercel.app</a>
  </body>
</html>
